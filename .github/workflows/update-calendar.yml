name: Update Warriors Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: write

jobs:
  build-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate calendar
        run: node index.js

      - name: Show files after generation
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Repo contents:"
          ls -la
          echo ""
          echo "Find ICS files:"
          find . -iname "*.ics" -print

      - name: Verify warriors.ics exists
        run: test -f warriors.ics

      - name: Commit updated ICS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add warriors.ics
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update warriors.ics"

      - name: Push changes
        run: git push origin HEAD:main
